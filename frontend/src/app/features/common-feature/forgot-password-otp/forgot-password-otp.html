<div class="login-container">
    <div class="login-wrapper shadow-lg">
        <div class="login-visual p-5 text-white d-flex flex-column justify-content-center align-items-center text-center w-50"
            style="background: linear-gradient(135deg, #198754, #28a745);">
            <div class="visual-content animate-slide-in">
                <h1 class="fw-bold mb-3 display-5">Verify OTP</h1>
                <p class="lead mb-4 opacity-75">We've sent a 6-digit code to your email.</p>
                <div class="circle-decoration"></div>
            </div>
        </div>

        <div class="login-form p-5 bg-white d-flex align-items-center w-50">
            <div class="w-100 animate-fade-in">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-success">Verification Code</h2>
                    <p class="text-muted">Enter the code sent to {{ email }}</p>
                </div>

                <form (ngSubmit)="onSubmit()">
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control text-center fs-4 letter-spacing-2" id="otpInput"
                            placeholder="000000" [(ngModel)]="otpCode" name="otpCode" maxlength="6" required>
                        <label for="otpInput">6-digit OTP Code</label>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-3 fw-bold btn-lg mb-3" [disabled]="isLoading">
                        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"
                            aria-hidden="true"></span>
                        VERIFY OTP
                    </button>

                    <div class="text-center mt-3">
                        <span class="text-muted">Didn't receive code?</span>
                        <button type="button"
                            class="btn btn-link text-decoration-none fw-bold ms-1 text-success p-0 align-baseline"
                            (click)="resendOtp()">
                            Resend OTP
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <a routerLink="/forgot-password" class="text-decoration-none text-muted">
                            <i class="bi bi-arrow-left me-1"></i> Back to Email Input
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
