<div class="login-container">
    <div class="login-wrapper shadow-lg">
        <div class="login-visual p-5 text-white d-flex flex-column justify-content-center align-items-center text-center w-50"
            style="background: linear-gradient(135deg, #0d6efd, #00C6FF);">
            <div class="visual-content animate-slide-in">
                <h1 class="fw-bold mb-3 display-5">Forgot Password?</h1>
                <p class="lead mb-4 opacity-75">Don't worry, we'll help you get back to your account.</p>
                <div class="circle-decoration"></div>
            </div>
        </div>

        <div class="login-form p-5 bg-white d-flex align-items-center w-50">
            <div class="w-100 animate-fade-in">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-primary">Recover Account</h2>
                    <p class="text-muted">Enter your email to receive an OTP</p>
                </div>

                <form (ngSubmit)="onSubmit()">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com"
                            [(ngModel)]="email" name="email" required>
                        <label for="emailInput">Email address</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold btn-lg mb-4" [disabled]="isLoading">
                        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"
                            aria-hidden="true"></span>
                        SEND OTP
                    </button>

                    <div class="text-center">
                        <span class="text-muted">Remember your password?</span>
                        <a routerLink="/login" class="text-decoration-none fw-bold ms-1 text-primary">Login Now</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
