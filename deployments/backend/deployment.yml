apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: safarnama
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: wantedmind11/backend:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: safarnama-secrets
