<div class="login-container">
    <div class="login-wrapper shadow-lg">
        <div class="login-visual p-5 text-white d-flex flex-column justify-content-center align-items-center text-center w-50"
            style="background: linear-gradient(135deg, #6f42c1, #a370f7);">
            <div class="visual-content animate-slide-in">
                <h1 class="fw-bold mb-3 display-5">New Password</h1>
                <p class="lead mb-4 opacity-75">Secure your account with a strong new password.</p>
                <div class="circle-decoration"></div>
            </div>
        </div>

        <div class="login-form p-5 bg-white d-flex align-items-center w-50">
            <div class="w-100 animate-fade-in">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-purp">Reset Password</h2>
                    <p class="text-muted">Create a new password for {{ email }}</p>
                </div>

                <form (ngSubmit)="onSubmit()">

                    <div class="form-floating mb-3 position-relative">
                        <input [type]="showPassword1 ? 'text' : 'password'" class="form-control" id="newPassword"
                            placeholder="New Password" [(ngModel)]="newPassword" name="newPassword" required
                            minlength="6">
                        <label for="newPassword">New Password</label>
                        <button type="button"
                            class="btn btn-link position-absolute top-50 end-0 translate-middle-y text-muted pe-3 text-decoration-none"
                            (click)="togglePasswordVisibility(1)" style="z-index: 10;">
                            <i class="bi" [class.bi-eye-fill]="!showPassword1"
                                [class.bi-eye-slash-fill]="showPassword1"></i>
                        </button>
                    </div>

                    <div class="form-floating mb-4 position-relative">
                        <input [type]="showPassword2 ? 'text' : 'password'" class="form-control" id="confirmPassword"
                            placeholder="Confirm Password" [(ngModel)]="confirmPassword" name="confirmPassword"
                            required>
                        <label for="confirmPassword">Confirm Password</label>
                        <button type="button"
                            class="btn btn-link position-absolute top-50 end-0 translate-middle-y text-muted pe-3 text-decoration-none"
                            (click)="togglePasswordVisibility(2)" style="z-index: 10;">
                            <i class="bi" [class.bi-eye-fill]="!showPassword2"
                                [class.bi-eye-slash-fill]="showPassword2"></i>
                        </button>
                    </div>

                    <button type="submit" class="btn btn-purp w-100 py-3 fw-bold btn-lg mb-4 text-white"
                        [disabled]="isLoading">
                        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"
                            aria-hidden="true"></span>
                        UPDATE PASSWORD
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
